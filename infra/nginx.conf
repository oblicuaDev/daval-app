server {
    listen 80;
    server_name 34.68.133.113;

    # ---- API (Node/Express en localhost:3000) ----
    location /api/ {
        # quita el prefijo /api antes de pasar al backend
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ---- Health check directo al backend ----
    location = /api/health {
        rewrite ^ /health break;
        proxy_pass http://127.0.0.1:3000;
    }

    # ---- SPA React ----
    root /var/www/davalapp/client;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Tamaño máximo de uploads (imágenes de productos, attachments)
    client_max_body_size 10m;
}
