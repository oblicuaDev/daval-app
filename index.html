<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de gestión comercial Distribuciones Daval</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function loadOblicuaCredits() {
        var script = document.createElement('script');
        script.src = 'https://lab.oblicua.co/credits/credits.js?v=' + Date.now();
        script.async = true;
        script.onload = function () {
          try {
            if (typeof window.setCredits === 'function') {
              window.setCredits('#000000', 'Daval');
            }
          } catch (error) {
            console.warn('Oblicua credits could not be initialized.', error);
          }
        };
        script.onerror = function () {
          console.warn('Oblicua credits script could not be loaded.');
        };
        document.head.appendChild(script);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
